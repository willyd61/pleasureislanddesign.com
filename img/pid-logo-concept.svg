<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="Pleasure Island Design">
  <title>Pleasure Island Design</title>
  <defs>
    <linearGradient id="pidSweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7DA69E"/>
      <stop offset="0.5" stop-color="#5B8078"/>
      <stop offset="1" stop-color="#C4973B"/>
    </linearGradient>
    <linearGradient id="pidStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8078"/>
      <stop offset="1" stop-color="#C4973B"/>
    </linearGradient>
  </defs>

  <!-- ===== Brush mark (modern, geometric; chair motif removed) ===== -->
  <g transform="translate(6 6)">
    <!-- navy badge -->
    <rect x="0" y="0" width="84" height="84" rx="22" fill="#1E3A5F"/>

    <!-- sweeping refinishing stroke -->
    <path d="M16 62 C 30 42, 48 36, 70 41 C 55 49, 47 57, 43 69 C 34 67, 24 65, 16 62 Z"
          fill="url(#pidStroke)"/>

    <!-- brush bristle tip -->
    <path d="M24 47 L40 36 L48 47 L36 60 Z" fill="url(#pidSweep)"/>

    <!-- gold ferrule -->
    <rect x="40" y="29" width="13" height="9" rx="2.5"
          transform="rotate(40 46.5 33.5)" fill="#C4973B"/>

    <!-- handle -->
    <rect x="45" y="6" width="9" height="34" rx="4.5"
          transform="rotate(40 49.5 23)" fill="#F9F6F1"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <g transform="translate(104 0)" font-family="'Poppins','Segoe UI',Arial,sans-serif">
    <text x="0" y="44" font-size="30" font-weight="700" letter-spacing="0.5" fill="#1E3A5F">Pleasure Island</text>
    <text x="2" y="72" font-size="15.5" font-weight="500" letter-spacing="7.5" fill="#5B8078">D E S I G N</text>
  </g>
</svg>
