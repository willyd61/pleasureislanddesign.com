name: Publish Scheduled Blog Posts

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for posts to publish
        id: check_posts
        run: |
          node blog/scripts/check-scheduled-posts.js
        continue-on-error: true

      - name: Run blog publisher
        if: steps.check_posts.outcome == 'success'
        run: |
          php blog/publish-scheduled.php

      - name: Lint published content
        if: steps.check_posts.outcome == 'success'
        run: |
          npm run lint:html
        continue-on-error: true

      - name: Commit published posts
        if: steps.check_posts.outcome == 'success'
        run: |
          git config user.name "Pleasure Island Design Bot"
          git config user.email "pleasureislanddesign@gmail.com"
          git add -A

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "publish: blog posts $(date '+%Y-%m-%d')"
            git push origin main
          fi

      - name: Deploy to GoDaddy (optional)
        if: steps.check_posts.outcome == 'success'
        run: |
          echo "Blog posts published and committed. Deploy to GoDaddy via cPanel."
